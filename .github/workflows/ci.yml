name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  flake-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: nix flake check
        run: nix flake check --print-build-logs

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build (Debug) and run unit + integration tests
        run: nix run .#test

# Sanitizers (ASan/UBSan, TSan) and clang-tidy intentionally don't run
# on push. They live on the developer's local box: `nix run .#test --
# asan|tsan` and `clang-tidy --warnings-as-errors=* -p build <file>`
# before push. Push CI is the smoke check — flake evaluates and the
# vanilla suite passes — not the gate.
