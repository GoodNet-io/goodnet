name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  flake-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: nix flake check
        run: nix flake check --print-build-logs

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build (Debug) and run unit + integration tests
        run: nix run .#test

  plugin-verify:
    # Each loadable plugin lives in its own git under
    # `github.com/goodnet-io/<repo>`. This matrix confirms every
    # plugin's `flake.nix` evaluates and `nix build .#default`
    # produces an artefact standalone — i.e. without the kernel
    # monorepo's CMake tree present. Catches `find_package(GoodNet)`
    # / `flake.nix` regressions in plugin repos.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - { repo: link-tcp,         path: plugins/links/tcp }
          - { repo: link-udp,         path: plugins/links/udp }
          - { repo: link-ipc,         path: plugins/links/ipc }
          - { repo: link-tls,         path: plugins/links/tls }
          - { repo: link-ws,          path: plugins/links/ws }
          - { repo: link-ice,         path: plugins/links/ice }
          - { repo: link-quic,        path: plugins/links/quic }
          - { repo: handler-heartbeat, path: plugins/handlers/heartbeat }
          - { repo: security-noise,   path: plugins/security/noise }
          - { repo: security-null,    path: plugins/security/null }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: goodnet-io/${{ matrix.plugin.repo }}
          path: ${{ matrix.plugin.path }}
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build plugin standalone
        working-directory: ${{ matrix.plugin.path }}
        run: nix build .#default --print-build-logs

  clang-tidy:
    # Diff-based mirror of `.githooks/pre-commit`: re-enter the dev
    # shell so `clang-tidy` inherits `NIX_CFLAGS_COMPILE` (gtest,
    # spdlog, fmt etc.), then lint every *.{cpp,hpp,h,cc} file the
    # diff touches against `--warnings-as-errors=*`. Push-event runs
    # against the previous commit; PR-event runs against the base
    # branch. Skipped when no C/C++ files changed.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build (Debug, emits compile_commands.json)
        run: nix run .#build --
      - name: Collect changed C/C++ files
        id: changed
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
          else
            base="HEAD^"
          fi
          files=$(git diff --name-only --diff-filter=ACMR "$base"...HEAD \
                    | grep -E '\.(cpp|hpp|h|cc)$' || true)
          {
            echo 'files<<EOF'
            printf '%s\n' "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Run clang-tidy on changed files
        if: steps.changed.outputs.files != ''
        run: |
          printf '%s\n' '${{ steps.changed.outputs.files }}' \
            | xargs -P 4 -I{} nix develop --command \
                clang-tidy --quiet --warnings-as-errors='*' -p build {}

# Sanitizers (ASan/UBSan, TSan) intentionally don't run on push. They
# live on the developer's local box: `nix run .#test -- asan|tsan`
# before push. Push CI is the smoke check — flake evaluates, vanilla
# suite passes, clang-tidy clean on the diff. Full sanitizer pass on
# a 2-core GitHub-hosted runner is a 60-90 min critical-path tax that
# magic-nix-cache only partially recovers; see plan
# `~/.claude/plans/glowing-tickling-cocke.md` §2 for the policy.
