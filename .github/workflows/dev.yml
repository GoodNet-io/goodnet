name: Dev CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches-ignore: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Build (Release) and run tests
        run: nix run .#test

# Dev branch is intentionally minimum-friction: only the test gate
# runs. clang-tidy lives in `.githooks/pre-commit` (installable via
# `nix run .#setup`) so the diagnostic loop stays at commit time, not
# CI time. Plugin-verify matrix and the ice-3node Docker harness only
# run on main (`ci.yml`); release artefacts only build on tag push
# (`release.yml`).
