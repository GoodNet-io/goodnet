<text text-anchor="middle" x="398.8" y="-60.96" font-family="JetBrains Mono,Fira Code,monospace" font-size="9.00" fill="#585b70">Stream framing rationale</text>
<text text-anchor="middle" x="398.8" y="-48.21" font-family="JetBrains Mono,Fira Code,monospace" font-size="9.00" fill="#585b70"> &#160;· TCP and TLS are byte streams; STUN messages have no</text>
<text text-anchor="middle" x="398.8" y="-35.46" font-family="JetBrains Mono,Fira Code,monospace" font-size="9.00" fill="#585b70"> &#160;&#160;&#160;intrinsic boundary, so a length prefix is mandatory</text>
<text text-anchor="middle" x="398.8" y="-22.71" font-family="JetBrains Mono,Fira Code,monospace" font-size="9.00" fill="#585b70"> &#160;&#160;&#160;per RFC 5389 §7.2.2 / RFC 5766 §11.6</text>
<text text-anchor="middle" x="398.8" y="-9.96" font-family="JetBrains Mono,Fira Code,monospace" font-size="9.00" fill="#585b70"> &#160;· UDP needs no framing — each datagram is one message</text>
